<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="style.css">
        <title>Timer</title>
    </head>
    <body>

        <main>
            <div class="timer-display">

                <button class="reset-button">Reset</button>
            </div>

        </main>
    </body>
</html>
